name: Générer un article

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:
    inputs:
      sujet:
        description: "Sujet précis (laisser vide = prochain sujet du backlog)"
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  generer:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le repo
        uses: actions/checkout@v4

      - name: Installer Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Générer l'article (recherche + rédaction + vérif + correction)
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          SUJET:               ${{ github.event.inputs.sujet }}
        run: node scripts/generer.mjs

      - name: Ouvrir la Pull Request (NE PUBLIE PAS — attend ton merge)
        uses: peter-evans/create-pull-request@v6
        with:
          branch: article/run-${{ github.run_id }}
          delete-branch: true
          title: ${{ env.PR_TITRE }}
          commit-message: ${{ env.PR_TITRE }}
          body-path: VERIFICATION.md
          add-paths: |
            blog/**
            blog.html
            sitemap.xml
            scripts/sujets.json
